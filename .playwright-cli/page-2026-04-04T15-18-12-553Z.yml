    - paragraph [ref=e22]: 这个网站旨在用互动的方式展示自然界中最迷人的跨物种关系之一——蝴蝶与蚂蚁的共生与寄生。 所有图片由 AI 生成，内容基于真实科学研究。虫痕鉴定功能由 GLM-5V 视觉模型驱动。
