    - separator [ref=e38]
    - heading "🔬 科学背景" [level=3] [ref=e39]
    - paragraph [ref=e40]: 灰蝶科（Lycaenidae）是鳞翅目中最大的科之一，全球约有6000种。 其中约75%的物种在生活史的某个阶段与蚂蚁发生互作关系， 这种关系从简单的互利共生到极端的社会性寄生，构成了进化生物学中最引人入胜的研究领域之一。
